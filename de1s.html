<html>
<body>
    
<style>
    body {
        padding: 1%;
    }
    .font {
        font-size: 16px;
        font-family: "Lucida Sans Unicode", "Lucida Grande", sans-serif
    }
    input[type=button] {
        font-size: 16px;
        font-family: "Lucida Sans Unicode", "Lucida Grande", sans-serif;
        margin: 2px 0px;
    }
    input[type=text] {
        font-size: 16px;
        font-family: Garamond, serif;
        padding: 2px 4px;
        margin: 4px;
    }
    .width100 {
        width: 100px;
    }
    .width200 {
        width: 200px;
    }
    .width400 {
        width: 400px;
    }
    table,td {
        padding-left: 8px;
        padding-right: 8px;
        padding-top: 4px;
        padding-bottom: 4px;
        text-align: left;
        border: 1px solid black;
        border-collapse: collapse;
    }
    th {
        padding-left: 8px;
        padding-right: 8px;
        padding-top: 4px;
        text-align: left;
        border: 1px solid black;
        border-collapse: collapse;
        vertical-align: top;
    }
    .info {
        font-size: 16px;
        font-family: "Lucida Sans Unicode", "Lucida Grande", sans-serif;
        line-height: 1.5;
    }
</style>

<p id="equation" class="font"></p>

<form id="form" class="font">dⁿy/dtⁿ = f(t,y,y',...,y⁽ⁿ⁻¹⁾) = <input type="text" class="width400" oninput="updateequation()" value="(-1)*(2+Math.log(1-(2*Math.cos(y[0]))/(Math.cos(y[0])+1))/Math.cos(y[0]))/Math.cos(y[0])"> with n = <input type="text" class="width100" value="2"><br>
Initial values [y₀,y₀',...,y₀⁽ⁿ⁻¹⁾] = <input type="text" class="width400" value="[-Math.PI/3,0]"><br>
Number of steps within one tᵢ = <input type="text" class="width100" value="120000"><br>
Distance between successive tᵢ = <input type="text" class="width200" value="1"><br>
Calculation rate = <input type="text" class="width100" value="8000"> steps per <input type="text" class="width100" value="0.06"> seconds<br><br>
<input type="button" onclick="run()" value="Run" style="font-weight: bold;"> <input type="button" onclick="stop()" value="Stop" style="font-weight: bold;"> <input type="button" onclick="clean()" value="Clear" style="font-weight: bold;"> <input id="tablebutton" type="button" onclick="tabletoggle()" value="Hide table" style="font-weight: bold;"></form>

<hr color=black size=1px><p id="info" class="info"></p>

<p id="stats" class="font"></p>

<div id="achart" style="width:100%;height:800px"></div><br>

<table id="table" class="font"></table>

<p id="debug" class="font"></p>

<script src='https://cdn.plot.ly/plotly-2.24.1.min.js'></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
<script>
    
    d = 0.1
    n = 20
    s = 1000
    y0 = [2,0]
    h = 0.0001
    N = 2
    expr = "y"
    fprevious = []
    ystart = []
    running = 0
    fixed = 0
    iterations = 0
    stepsonce = 1000
    superscripts = ["¹","²","³","⁴","⁵","⁶","⁷","⁸","⁹","¹⁰","¹¹","¹²","¹³","¹⁴","¹⁵","¹⁶","¹⁷","¹⁸","¹⁹","²⁰","²¹","²²","²³","²⁴","²⁵","²⁶","²⁷","²⁸","²⁹","³⁰","³¹","³²","³³","³⁴","³⁵","³⁶","³⁷","³⁸","³⁹","⁴⁰","⁴¹","⁴²","⁴³","⁴⁴","⁴⁵","⁴⁶","⁴⁷","⁴⁸","⁴⁹","⁵⁰","⁵¹","⁵²","⁵³","⁵⁴","⁵⁵","⁵⁶","⁵⁷","⁵⁸","⁵⁹","⁶⁰","⁶¹","⁶²","⁶³","⁶⁴","⁶⁵","⁶⁶","⁶⁷","⁶⁸","⁶⁹","⁷⁰","⁷¹","⁷²","⁷³","⁷⁴","⁷⁵","⁷⁶","⁷⁷","⁷⁸","⁷⁹","⁸⁰","⁸¹","⁸²","⁸³","⁸⁴","⁸⁵","⁸⁶","⁸⁷","⁸⁸","⁸⁹","⁹⁰","⁹¹","⁹²","⁹³","⁹⁴","⁹⁵","⁹⁶","⁹⁷","⁹⁸","⁹⁹"]
    colours = ['0,158,242,1','255,77,125,1','0,196,195,1','255,157,0,1','167,70,255,1','58,134,255,1','131,56,236,1','255,0,110,1','251,86,7,1','255,190,11,1','38,70,83,1','42,157,143,1','233,196,106,1','244,162,97,1','231,111,81,1','0,245,212,1','0,187,249,1','254,228,64,1','241,91,181,1','155,93,229,1','228,193,249,1','169,222,249,1','208,244,222,1','252,246,189,1','255,153,200,1']
    layout = {xaxis:{title:'t',titlefont:{family:'LucidaSansUnicode,LucidaGrande,sans-serif',size:18},tickfont:{family:'LucidaSansUnicode,LucidaGrande,sans-serif',size:16},exponentformat:'power',showexponent:'all'},yaxis:{tickfont:{family:'LucidaSansUnicode,LucidaGrande,sans-serif',size:16},exponentformat:'power',showexponent:'all'},legend:{font:{family:'LucidaSansUnicode,LucidaGrande,sans-serif',size:18}},showlegend:true,hoverlabel:{font:{family:'LucidaSansUnicode,LucidaGrande,sans-serif',size:14}}}
    
    function updateequation() {
        equationtext = document.getElementById("form").elements[0].value
        equationtext = equationtext.replaceAll("Math.E","e").replaceAll("Math.PI","\\pi")
        equationtext = equationtext.replaceAll("(","({").replaceAll(")","})").replaceAll("**","^").replaceAll("*","\\cdot ")
        document.getElementById("equation").innerHTML = "$$"+equationtext.replaceAll("Math.","\\").replaceAll("/","\\over ")+"$$"
        MathJax.typeset()
        
    }
    
    updateequation()
    
    function f(t,y) {
        return eval(expr)
    }
    
    function g(t,y) {
        k0 = f(t,y)
        ys = y.slice(1,N)
        return ys.concat(k0)
    }
    
    function tabletoggle() {
        hidden = document.getElementById("table").getAttribute("hidden")
        if (hidden) {
            document.getElementById("table").removeAttribute("hidden")
            document.getElementById("tablebutton").value = "Hide table"
        } else {
            document.getElementById("table").setAttribute("hidden","hidden")
            document.getElementById("tablebutton").value = "Show table"
        }
    }
    
    function classicfourthorderrungekuttamethod(h,ti,yi) {
        k1 = []
        k2 = []
        k3 = []
        k4 = []
        
        k1f = f(ti,yi)
        yis = yi.slice(1,N)
        k1 = yis.concat(k1f)
        
        hk1 = k1.map(x => (h/2)*x);
        yi1 = yi.map(function (num, idx) {return num + hk1[idx];});
        k2f = f(ti+h/2,yi1)
        yi1s = yi1.slice(1,N)
        k2 = yi1s.concat(k2f)
        
        hk2 = k2.map(x => (h/2)*x);
        yi2 = yi.map(function (num, idx) {return num + hk2[idx];});
        k3f = f(ti+h/2,yi2)
        yi2s = yi2.slice(1,N)
        k3 = yi2s.concat(k3f)
        
        hk3 = k3.map(x => h*x);
        yi3 = yi.map(function (num, idx) {return num + hk3[idx];});
        k4f = f(ti+h,yi3)
        yi3s = yi3.slice(1,N)
        k4 = yi3s.concat(k4f)
        
        k2m = k2.map(x => 2*x);
        k3m = k3.map(x => 2*x);
        kt = k1.map(function (num, idx) {return num + k2m[idx] + k3m[idx] + k4[idx];});
        kth = kt.map(x => (h/6)*x);
        ans = yi.map(function (num, idx) {return num + kth[idx];});
        return ans
    }
    
    function eighthorderadamsbashforthmethod(h,ti,yi) {
        f0m = fprevious[0].map(x => (16083/4480)*x);
        f1m = fprevious[1].map(x => (-1152169/120960)*x);
        f2m = fprevious[2].map(x => (242653/13440)*x);
        f3m = fprevious[3].map(x => (-296053/13440)*x);
        f4m = fprevious[4].map(x => (2102243/120960)*x);
        f5m = fprevious[5].map(x => (-115747/13440)*x);
        f6m = fprevious[6].map(x => (32863/13440)*x);
        f7m = fprevious[7].map(x => (-5257/17280)*x);
        fm = f0m.map(function (num, idx) {return num + f1m[idx] + f2m[idx] + f3m[idx] + f4m[idx] + f5m[idx] + f6m[idx] + f7m[idx];});
        fmh = fm.map(x => h*x);
        ans = yi.map(function (num, idx) {return num + fmh[idx];});
        return ans
    }
    
    function plot(c) {
        points = document.getElementById("table").rows.length - 1
        xvalues = []
        yvalues = []
        for (i=1;i<=points;i++) {
            xvalues.push(document.getElementById("table").rows[i].cells[1].innerHTML)
            yvalues.push(document.getElementById("table").rows[i].cells[c+2].innerHTML)
        }
        data = [{
            x: xvalues,
            y: yvalues,
            type: 'scatter',
            mode: 'lines+markers',
            name: derivative(c),
            marker: {
                color: 'rgba(' + colours[c] + ')'
            },
            line: {
                color: 'rgba(' + colours[c] + ')',
                shape: 'spline',
                smoothness: 0.5
            }
        },{x:[],y:[],z:[],ncontours:0,showscale:false,type:'contour'}]
        Plotly.newPlot("achart",data,eval(layout))
    }
    
    function plotall() {
        points = document.getElementById("table").rows.length - 1
        xvalues = []
        for (i=1;i<=points;i++) {
            xvalues.push(document.getElementById("table").rows[i].cells[1].innerHTML)
        }
        data = []
        for (c=0;c<=N;c++) {
            yvalues = []
            for (j=1;j<=points;j++) {
                yvalues.push(document.getElementById("table").rows[j].cells[c+2].innerHTML)
            }
            data.push("{x: [" + xvalues + "],y: [" + yvalues + "],type: 'scatter',mode: 'lines+markers',name: '" + derivative(c) + "',marker: {color: 'rgba(" + colours[c] + ")'},line: {color: 'rgba(" + 
            colours[c] + ")',shape: 'spline',smoothness: 0.5}}")
        }
        data.push("{x:[],y:[],z:[],ncontours:0,showscale:false,type:'contour'}")
        Plotly.newPlot("achart",eval("[" + data + "]"),eval(layout))
    }
    
    function derivative(nth) {
        if (nth==0) {
            return "yᵢ"
        }
        if (nth==1) {
            return "yᵢ′"
        }
        if (nth==2) {
            return "yᵢ″"
        }
        if (nth>=3) {
            return "yᵢ⁽" + superscripts[nth-1] + "⁾"
        }
    }
    
    function run() {
        if (running==0) {
        if (fixed==0) {
            expr = document.getElementById("form").elements[0].value
            N = eval(document.getElementById("form").elements[1].value)
            d = eval(document.getElementById("form").elements[4].value)
            s = eval(document.getElementById("form").elements[3].value)
            y0 = eval(document.getElementById("form").elements[2].value)
            h = d/s
            ystart = []
            fprevious = []
            heading = "<tr><th style=\"padding-top: 8px;\">i</th><th><form>tᵢ <input type=\"button\" onclick=\"plotall()\" value=\"Plot all\"></form></th><th><form>yᵢ <input type=\"button\" onclick=\"plot(0)\" value=\"Plot\"></form></th><th><form>yᵢ' <input type=\"button\" onclick=\"plot(1)\" value=\"Plot\"></form></th>"
            if (N>=2) {
                heading += "<th><form>yᵢ'' <input type=\"button\" onclick=\"plot(2)\" value=\"Plot\"></form></th>"
            }
            for (i=3;i<=N;i++) {
                heading += "<th><form>yᵢ⁽" + superscripts[i-1] + "⁾  <input type=\"button\" onclick=\"plot(" + i + ")\" value=\"Plot\"></form></th>"
            }
            document.getElementById("table").innerHTML = heading + "</tr>"
            document.getElementById("info").innerHTML = "dⁿy/dtⁿ = f(t,y,y',...,y⁽ⁿ⁻¹⁾) = " + expr + " with n = " + N + "<br>Initial values [y₀,y₀',...,y₀⁽ⁿ⁻¹⁾] = " + y0 + "<br>Number of steps within one tᵢ = " + s + "<br>Distance between successive tᵢ = " + d
        }
        fixed = 1
        stepsonce = eval(document.getElementById("form").elements[5].value)
        theinterval = setInterval(runonce,eval(document.getElementById("form").elements[6].value)*1000)
        running = 1
        }
    }
    
    function stop() {
        if (running==1) {
            clearInterval(theinterval)
            document.getElementById("stats").innerHTML = document.getElementById("stats").innerHTML.replace("Running","Stopped")
        }
        running = 0
    }
    
    function clean() {
        if (running==0) {
            fixed = 0
            iterations = 0
            ystart = []
            document.getElementById("table").innerHTML = ""
            document.getElementById("info").innerHTML = ""
            document.getElementById("stats").innerHTML = ""
            Plotly.purge("achart")
        }
    }
    
    function runonce() {
        document.getElementById("stats").innerHTML = "Running   i = " + iterations + " and t = " + iterations*(d/s)
        for (i=iterations;i<iterations+stepsonce;i++) {
            if (i%s==0) {
                row = "<tr><td>" + i + "</td><td>" + i*h + "</td>"
                for (j=0;j<N;j++) {
                    row += "<td>" + y0[j] + "</td>"
                }
                document.getElementById("table").innerHTML += row + "<td>" + f(i*h,y0) + "</td></tr>"
            }
            if (i<7) {
                ystart.push(y0)
                y0 = classicfourthorderrungekuttamethod(h,i*h,y0)
            }
            if (i==7) {
                ystart.push(y0)
                fprevious = [g(7*h,ystart[7]),g(6*h,ystart[6]),g(5*h,ystart[5]),g(4*h,ystart[4]),g(3*h,ystart[3]),g(2*h,ystart[2]),g(h,ystart[1]),g(0,ystart[0])]
                y0 = eighthorderadamsbashforthmethod(h,i*h,y0)
            }
            if (i>7) {
                fprevious = [g(i*h,y0),fprevious[0],fprevious[1],fprevious[2],fprevious[3],fprevious[4],fprevious[5],fprevious[6]]
                y0 = eighthorderadamsbashforthmethod(h,i*h,y0)
            }
        }
        iterations += stepsonce
    }
    
</script>
</body>
</html>
