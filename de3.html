    function classicfourthorderrungekuttamethod(h,ti,yi) {
        k1 = g(ti,yi)
        hk1 = k1.map(x => (h/2)*x);
        yi1 = yi.map(function (num, idx) {return num + hk1[idx];});
        k2 = g(ti+h/2,yi1)
        hk2 = k2.map(x => (h/2)*x);
        yi2 = yi.map(function (num, idx) {return num + hk2[idx];});
        k3 = g(ti+h/2,yi2)
        hk3 = k3.map(x => h*x);
        yi3 = yi.map(function (num, idx) {return num + hk3[idx];});
        k4 = g(ti+h,yi3)
        k2m = k2.map(x => 2*x);
        k3m = k3.map(x => 2*x);
        kt = k1.map(function (num, idx) {return num + k2m[idx] + k3m[idx] + k4[idx];});
        kth = kt.map(x => (h/6)*x);
        ans = yi.map(function (num, idx) {return num + kth[idx];});
        return ans
    }
    
    function eighthorderadamsbashforthmethod(h,ti,yi) {
        f0m = fprevious[0].map(x => (16083/4480)*x);
        f1m = fprevious[1].map(x => (-1152169/120960)*x);
        f2m = fprevious[2].map(x => (242653/13440)*x);
        f3m = fprevious[3].map(x => (-296053/13440)*x);
        f4m = fprevious[4].map(x => (2102243/120960)*x);
        f5m = fprevious[5].map(x => (-115747/13440)*x);
        f6m = fprevious[6].map(x => (32863/13440)*x);
        f7m = fprevious[7].map(x => (-5257/17280)*x);
        fm = f0m.map(function (num, idx) {return num + f1m[idx] + f2m[idx] + f3m[idx] + f4m[idx] + f5m[idx] + f6m[idx] + f7m[idx];});
        fmh = fm.map(x => h*x);
        ans = yi.map(function (num, idx) {return num + fmh[idx];});
        return ans
    }

    function derivative(i,nth) {
        if (i%3==1) {
            str = "x" + subscripts[(i-1)/3]
        }
        if (i%3==2) {
            str = "y" + subscripts[(i-2)/3]
        }
        if (i%3==0) {
            str = "z" + subscripts[i/3-1]
        }
        if (nth==0) {
            return str
        }
        if (nth==1) {
            return str + "′"
        }
        if (nth==2) {
            return str + "″"
        }
        if (nth>=3) {
            return str + "⁽" + superscripts[nth-1] + "⁾"
        }
    }

            y0 = eval(document.getElementById("form").elements[2].value)
            h = d/s
            ystart = []
            fprevious = []
            heading = "<tr><th style=\"padding-top: 8px;\">i</th><th><form>tᵢ <input type=\"button\" onclick=\"plotall()\" value=\"Plot xᵢ, yᵢ and zᵢ\"> <input type=\"button\" onclick=\"plotallxy()\" value=\"Plot (xᵢ,yᵢ)\"> <input type=\"button\" onclick=\"plotallyz()\" value=\"Plot (yᵢ,zᵢ)\"> <input type=\"button\" onclick=\"plotallzx()\" value=\"Plot (zᵢ,xᵢ)\"> <input type=\"button\" onclick=\"plotallxyz()\" value=\"Plot (xᵢ,yᵢ,zᵢ)\"></form></th>"
            for (i=0;i<=N-1;i++) {
                if (i%3==0) {
                    heading += "<th><form>" + derivative(i+1,0) + " <input type=\"button\" onclick=\"plot(" + i + ")\" value=\"Plot " + derivative(i+1,0) + "\"> <input type=\"button\" onclick=\"plotxy(" + i + ")\" value=\"Plot (" + derivative(i+1,0) +"," + derivative(i+2,0) + ")\"> <input type=\"button\" onclick=\"plotxyz(" + i + ")\" value=\"Plot (" + derivative(i+1,0) + "," + derivative(i+2,0) + "," + derivative(i+3,0) + ")\"></form></th>"
                }
                if (i%3==1) {
                    heading += "<th><form>" + derivative(i+1,0) + " <input type=\"button\" onclick=\"plot(" + i + ")\" value=\"Plot " + derivative(i+1,0) + "\"> <input type=\"button\" onclick=\"plotyz(" + i + ")\" value=\"Plot (" + derivative(i+1,0) +"," + derivative(i+2,0) + ")\"></form></th>"
                }
                if (i%3==2) {
                    heading += "<th><form>" + derivative(i+1,0) + " <input type=\"button\" onclick=\"plot(" + i + ")\" value=\"Plot " + derivative(i+1,0) + "\"> <input type=\"button\" onclick=\"plotzx(" + i + ")\" value=\"Plot (" + derivative(i+1,0) +"," + derivative(i-1,0) + ")\"></form></th>"
                }
            }
            document.getElementById("table").innerHTML = heading + "</tr>"
            document.getElementById("info").innerHTML = "[dx₁/dt,dy₁/dt,dz₁/dt,...,dxₙ/dt,dyₙ/dt,dzₙ/dt] = " + expr + " with n = " + N/3 + "<br>Initial values [x₁(0),y₁(0),z₁(0),...,xₙ(0),yₙ(0),zₙ(0) = " + y0 + "<br>Number of steps within one tᵢ = " + s + "<br>Distance between successive tᵢ = " + d
        }
        fixed = 1
        stepsonce = eval(document.getElementById("form").elements[5].value)
        theinterval = setInterval(runonce,eval(document.getElementById("form").elements[6].value)*1000)
        running = 1
        }
    }
    
    function stop() {
        if (running==1) {
            clearInterval(theinterval)
            document.getElementById("stats").innerHTML = document.getElementById("stats").innerHTML.replace("Running","Stopped")
        }
        running = 0
    }
    
    function clean() {
        if (running==0) {
            fixed = 0
            iterations = 0
            ystart = []
            document.getElementById("table").innerHTML = ""
            document.getElementById("info").innerHTML = ""
            document.getElementById("stats").innerHTML = ""
            Plotly.purge("achart")
        }
    }
    
    function runonce() {
        document.getElementById("stats").innerHTML = "Running   i = " + iterations + " and t = " + iterations*(d/s)
        for (i=iterations;i<iterations+stepsonce;i++) {
            if (i%s==0) {
                row = "<tr><td>" + i + "</td><td>" + i*h + "</td>"
                for (j=0;j<N;j++) {
                    row += "<td>" + y0[j] + "</td>"
                }
                document.getElementById("table").innerHTML += row + "</tr>"
            }
            if (i<7) {
                ystart.push(y0)
                y0 = classicfourthorderrungekuttamethod(h,i*h,y0)
            }
            if (i==7) {
                ystart.push(y0)
                fprevious = [g(7*h,ystart[7]),g(6*h,ystart[6]),g(5*h,ystart[5]),g(4*h,ystart[4]),g(3*h,ystart[3]),g(2*h,ystart[2]),g(h,ystart[1]),g(0,ystart[0])]
                y0 = eighthorderadamsbashforthmethod(h,i*h,y0)
            }
            if (i>7) {
                fprevious = [g(i*h,y0),fprevious[0],fprevious[1],fprevious[2],fprevious[3],fprevious[4],fprevious[5],fprevious[6]]
                y0 = eighthorderadamsbashforthmethod(h,i*h,y0)
            }
        }
        iterations += stepsonce
    }
    
</script>
