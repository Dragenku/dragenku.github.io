    function classicfourthorderrungekuttamethod(h,ti,yi) {
        k1 = g(ti,yi)
        hk1 = k1.map(x => (h/2)*x);
        yi1 = yi.map(function (num, idx) {return num + hk1[idx];});
        k2 = g(ti+h/2,yi1)
        hk2 = k2.map(x => (h/2)*x);
        yi2 = yi.map(function (num, idx) {return num + hk2[idx];});
        k3 = g(ti+h/2,yi2)
        hk3 = k3.map(x => h*x);
        yi3 = yi.map(function (num, idx) {return num + hk3[idx];});
        k4 = g(ti+h,yi3)
        k2m = k2.map(x => 2*x);
        k3m = k3.map(x => 2*x);
        kt = k1.map(function (num, idx) {return num + k2m[idx] + k3m[idx] + k4[idx];});
        kth = kt.map(x => (h/6)*x);
        ans = yi.map(function (num, idx) {return num + kth[idx];});
        return ans
    }
    
    function eighthorderadamsbashforthmethod(h,ti,yi) {
        f0m = fprevious[0].map(x => (16083/4480)*x);
        f1m = fprevious[1].map(x => (-1152169/120960)*x);
        f2m = fprevious[2].map(x => (242653/13440)*x);
        f3m = fprevious[3].map(x => (-296053/13440)*x);
        f4m = fprevious[4].map(x => (2102243/120960)*x);
        f5m = fprevious[5].map(x => (-115747/13440)*x);
        f6m = fprevious[6].map(x => (32863/13440)*x);
        f7m = fprevious[7].map(x => (-5257/17280)*x);
        fm = f0m.map(function (num, idx) {return num + f1m[idx] + f2m[idx] + f3m[idx] + f4m[idx] + f5m[idx] + f6m[idx] + f7m[idx];});
        fmh = fm.map(x => h*x);
        ans = yi.map(function (num, idx) {return num + fmh[idx];});
        return ans
    }

            for (j=1;j<=points;j++) {
                xvalues.push(document.getElementById("table").rows[j].cells[2*c+2].innerHTML)
                yvalues.push(document.getElementById("table").rows[j].cells[2*c+3].innerHTML)
            }
            data.push("{x: [" + xvalues + "],y: [" + yvalues + "],text: [" + tvalues + "],type: 'scatter',mode: 'lines+markers',name: '(" + derivative(2*c+1,0) + "," + derivative(2*c+2,0) + ")',marker: {color: 'rgba(" + colours[c] + ")'},line: {color: 'rgba(" + 
            colours[c] + ")',shape: 'spline',smoothness: 0.5}}")
        }
        data.push("{x:[],y:[],z:[],ncontours:0,showscale:false,type:'contour'}")
        Plotly.newPlot("achart",eval("[" + data + "]"),eval(layoutxy))
    }
    
    function derivative(i,nth) {
        j = (i-1)%(N/2)
        if (j%2==0) {
            str = "x" + subscripts[j/2]
        }
        if (j%2==1) {
            str = "y" + subscripts[(j-1)/2]
        }
        if (i<=N/2) {
            return str
        } else if (i<=N) {
            return str + "′"
        } else {
            return str + "″"
        }
    }
    
    function createexpr(mass) {
        string = "["
        for (i=1;i<=N/4;i++) {
            string += "y[u(1," + (N/4+i) + ")],y[u(2," + (N/4+i) + ")],"
        }
        for (i=1;i<=N/4;i++) {
            string += G + "*("
            for (j=1;j<=N/4;j++) {
                if (i!=j) {
                    string += mass[j-1] + "*(y[u(1," + j + ")]-y[u(1," + i + ")])/((y[u(1," + j + ")]-y[u(1," + i + ")])**2+(y[u(2," + j + ")]-y[u(2," + i + ")])**2)**(3/2)+"
                }
            }
            string = string.slice(0,-1)
            string += ")," + G + "*("
            for (j=1;j<=N/4;j++) {
                if (i!=j) {
                    string += mass[j-1] + "*(y[u(2," + j + ")]-y[u(2," + i + ")])/((y[u(1," + j + ")]-y[u(1," + i + ")])**2+(y[u(2," + j + ")]-y[u(2," + i + ")])**2)**(3/2)+"
                }
            }
            string = string.slice(0,-1)
            string += "),"
        }
        string = string.slice(0,-1)
        string += "]"
        return string
    }
    
    function run() {
        if (running==0) {
        if (fixed==0) {
            masses = eval(document.getElementById("form").elements[0].value)
            N = 4*eval(document.getElementById("form").elements[1].value)
            d = eval(document.getElementById("form").elements[5].value)
            s = eval(document.getElementById("form").elements[4].value)
            y0x = eval(document.getElementById("form").elements[2].value)
            y0v = eval(document.getElementById("form").elements[3].value)
            expr = createexpr(masses)
            y0 = y0x.concat(y0v)
            h = d/s
            ystart = []
            fprevious = []
            heading = "<tr><th><form>i <input type=\"button\" onclick=\"plote()\" value=\"Plot E\"> <input type=\"button\" onclick=\"plotei()\" value=\"Plot Eᵢ\"> <input type=\"button\" onclick=\"plotkei()\" value=\"Plot KEᵢ\"> <input type=\"button\" onclick=\"plotgpei()\" value=\"Plot GPEᵢ\"></form></th>"
            heading += "<th><form>tᵢ <input type=\"button\" onclick=\"plotall()\" value=\"Plot all\"> <input type=\"button\" onclick=\"plotpositions()\" value=\"Plot (xᵢ,yᵢ)\"> <input type=\"button\" onclick=\"plotvelocities()\" value=\"Plot (xᵢ′,yᵢ′)\"> <input type=\"button\" onclick=\"plotaccelerations()\" value=\"Plot (xᵢ″,yᵢ″)\"></form></th>"
            for (i=0;i<=N*3/2-1;i++) {
                if (i%2==0) {
                    heading += "<th><form>" + derivative(i+1,0) + " <input type=\"button\" onclick=\"plot(" + i + ")\" value=\"Plot " + derivative(i+1,0) + "\"> <input type=\"button\" onclick=\"plotxy(" + i + ")\" value=\"Plot (" + derivative(i+1,0) +"," + derivative(i+2,0) + ")\"></form></th>"
                }
                if (i%2==1) {
                    heading += "<th><form>" + derivative(i+1,0) + " <input type=\"button\" onclick=\"plot(" + i + ")\" value=\"Plot " + derivative(i+1,0) + "\"></form></th>"
                }
            }
            document.getElementById("table").innerHTML = heading + "</tr>"
            document.getElementById("info").innerHTML = "Masses [m₁,m₂,...,mₙ] = " + masses + " with n = " + N/4 + "<br>Initial positions [x₁(0),y₁(0),...,xₙ(0),yₙ(0)] = " + y0x + " with n = " + N/4 + "<br>Initial velocities [x₁'(0),y₁'(0),...,xₙ'(0),yₙ'(0)] = " + y0v + " with n = " + N/4 + "<br>"
            document.getElementById("info").innerHTML += "[dx₁/dt,dy₁/dt,dx₂/dt,dy₂/dt,...,dxₙ/dt,dyₙ/dt] = " + expr + " with n = " + N/2 + "<br>Initial values [x₁(0),y₁(0),x₂(0),y₂(0),...,xₙ(0),yₙ(0)] = " + y0 + " with n = " + N/2 + "<br>Number of steps within one tᵢ = " + s + "<br>Distance between successive tᵢ = " + d
        }
        fixed = 1
        stepsonce = eval(document.getElementById("form").elements[6].value)
        theinterval = setInterval(runonce,eval(document.getElementById("form").elements[7].value)*1000)
        running = 1
        }
    }
    
    function stop() {
        if (running==1) {
            clearInterval(theinterval)
            document.getElementById("stats").innerHTML = document.getElementById("stats").innerHTML.replace("Running","Stopped")
        }
        running = 0
    }
    
    function clean() {
        if (running==0) {
            fixed = 0
            iterations = 0
            ystart = []
            document.getElementById("table").innerHTML = ""
            document.getElementById("info").innerHTML = ""
            document.getElementById("stats").innerHTML = ""
            Plotly.purge("achart")
        }
    }
    
    function runonce() {
        document.getElementById("stats").innerHTML = "Running   i = " + iterations + " and t = " + iterations*(d/s)
        for (i=iterations;i<iterations+stepsonce;i++) {
            if (i%s==0) {
                row = "<tr><td>" + i + "</td><td>" + i*h + "</td>"
                for (j=0;j<N;j++) {
                    row += "<td>" + y0[j] + "</td>"
                }
                for (j=0;j<N/2;j++) {
                    row += "<td>" + g(i*h,y0)[N/2+j] + "</td>"
                }
                document.getElementById("table").innerHTML += row + "</tr>"
            }
            if (i<7) {
                ystart.push(y0)
                y0 = classicfourthorderrungekuttamethod(h,i*h,y0)
            }
            if (i==7) {
                ystart.push(y0)
                fprevious = [g(7*h,ystart[7]),g(6*h,ystart[6]),g(5*h,ystart[5]),g(4*h,ystart[4]),g(3*h,ystart[3]),g(2*h,ystart[2]),g(h,ystart[1]),g(0,ystart[0])]
                y0 = eighthorderadamsbashforthmethod(h,i*h,y0)
            }
            if (i>7) {
                fprevious = [g(i*h,y0),fprevious[0],fprevious[1],fprevious[2],fprevious[3],fprevious[4],fprevious[5],fprevious[6]]
                y0 = eighthorderadamsbashforthmethod(h,i*h,y0)
            }
        }
        iterations += stepsonce
    }
    
</script>
